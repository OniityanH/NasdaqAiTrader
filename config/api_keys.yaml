# 交易设置
TRADING:
  # 监控的股票列表 (20只)
  WATCHLIST:
    - "AAPL"    # Apple
    - "NVDA"    # NVIDIA
    - "MSFT"    # Microsoft
    - "GOOGL"   # Google
    - "AMZN"    # Amazon
    - "META"    # Meta
    - "TSLA"    # Tesla
    - "AMD"     # AMD
    - "INTC"    # Intel
    - "NFLX"    # Netflix
    - "PYPL"    # PayPal
    - "ADBE"    # Adobe
    - "CRM"     # Salesforce
    - "ORCL"    # Oracle
    - "IBM"     # IBM
    - "CSCO"    # Cisco
    - "QCOM"    # Qualcomm
    - "TXN"     # Texas Instruments
    - "AVGO"    # Broadcom
    - "MU"      # Micron
  
  # 交易间隔 (秒)
  INTERVAL: 300  # 5分钟
  
  # 风控参数
  STOP_LOSS: 0.20      # 20% 止损
  TAKE_PROFIT: 0.30   # 30% 止盈
  MAX_POSITION: 0.20  # 单股最大 20% 仓位
  MAX_TRADE: 0.10     # 每次交易最大 10% 仓位
  MAX_DAILY_LOSS: 0.03 # 单日最大亏损 3%
